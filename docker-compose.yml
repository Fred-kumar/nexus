# ═══════════════════════════════════════════════════
# Nexus — docker-compose.yml (Full Stack)
# ═══════════════════════════════════════════════════

version: '3.9'

services:
  # ─── MongoDB ────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: nexus_mongo
    restart: always
    environment:
      MONGO_INITDB_DATABASE: nexus
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - nexus_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - nexus_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus_backend
    restart: always
    env_file: ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/nexus
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus_net
    volumes:
      - ./backend/logs:/home/node/app/logs

  # ─── Frontend ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nexus_net

  # ─── Nginx reverse proxy ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexus_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nexus_net

volumes:
  mongo_data:
  redis_data:

networks:
  nexus_net:
    driver: bridge
